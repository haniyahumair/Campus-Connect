<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusConnect</title>

    <link rel="stylesheet" href="/styles/global.css">
    <link rel="stylesheet" href="/styles/pages/cart.css">
</head>
<body>
    <header></header>

    <section class="cart-container">
        <h2 class="cart-title">Cart</h2>
        <div class="cart-layout">
            <div class="cart-left">
                <form id="checkoutForm">
                    <div id="cartContainer"></div>
                </form>
            </div>
            <div class="cart-right" style="display: none;">
                <div class="order-summary">
                    <h5>Order Summary</h5>
                    <p id="eventTitle"></p>
                    <hr>
                    <div class="summary-row">
                        <span id="cartTotal" style="font-weight: 700;">QAR 0.00</span>
                    </div>
                    <label class="terms-label">
                        <input type="checkbox" id="termsCheck">
                        I agree to <a href="#">Terms & Conditions</a>
                    </label>
                    <div class="payment-options">
                        <p class="payment-title">PAY WITH</p>
                        <button id="apple-pay-btn">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b0/Apple_Pay_logo.svg"
                                alt="Apple Pay" height="24" class="apple-pay-fallback">
                        </button>
                        <button class="paypal-btn">
                            <img src="https://www.paypalobjects.com/webstatic/mktg/Logo/pp-logo-100px.png" alt="PayPal">
                        </button>
                        <button class="payment-btn card">💳 Credit / Debit Card</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="bg-white py-4 text-center shadow-sm"></footer>

    <script type="module" src="/scripts/services/loggedInLogic.js"></script>
    <script type="module" src="/scripts/pages/cart.js"></script>
</body>
</html>
