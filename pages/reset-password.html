<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="/styles/pages/login-register.css">
</head>
<body>
    <section class="nav" style="margin-top: 24px;">
        <div class="company">
            <div class="logo">
                <a href="../index.html">
                    <img src="/assets/Icons/Logo.svg" alt="CampusConnect Logo">
                </a>
            </div>
            <div class="title">
                <p class="company-name">Campus<b>Connect</b></p>
            </div>
        </div>
    </section>

    <main>
        <div class="login-container">
            <div class="login-content">

                <!-- Step 1 -->
                <div id="step1">
                    <div class="text">
                        <h2>Reset Password</h2>
                        <p><i>Enter your email and we'll send you a reset link.</i></p>
                    </div>
                    <div class="login-form">
                        <div class="login-form-group">
                            <input type="email" id="reset-email" placeholder="Email Address" required style="color: var(--black);" />
                        </div>
                        <div class="l-submit-btn">
                            <input type="button" id="send-reset-btn" value="Send Reset Email" class="login-btn" />
                        </div>
                        <div class="link">
                            <p>Remembered it? <a href="/pages/login.html">Back to Login</a></p>
                        </div>
                    </div>
                </div>

                <!-- Step 2 (hidden until email is sent) -->
                <div id="step2" style="display:none;">
                    <div class="text">
                        <h2>New Password</h2>
                        <p><i>Enter your new password below.</i></p>
                    </div>
                    <div class="login-form">
                        <div class="login-form-group">
                            <input type="password" id="new-password" placeholder="New Password (min 6 characters)" required style="color: var(--black);" />
                            <input type="password" id="confirm-password" placeholder="Confirm New Password" required style="color: var(--black);" />
                        </div>
                        <div class="l-submit-btn">
                            <input type="button" id="update-password-btn" value="Reset Password" class="login-btn" />
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <div class="login-img">
            <img src="/assets/Images/website graphics.png" alt="Reset Password Image">
        </div>
    </main>

    <script type="module" src="/scripts/services/resetPassword.js"></script>
</body>
</html>
