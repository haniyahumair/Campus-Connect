<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusConnect</title>

    <!--Styling links-->
    <link rel="stylesheet" href="/styles/global.css">
    <link rel="stylesheet" href="/styles/pages/events.css">
</head>

<body>

    <header></header>

    <section class="events-header">
        <h1 class="fw-bold">Discover <i><span class="accent-text">Event’s</span></i></h1>
        <p>Your next great experience starts here</p>


        <div class="search-container">
            <div class="row justify-content-center">
                <div class="search-bar">
                    <input type="text" class="form-control" placeholder="Search event’s by name">
                </div>
                
                <!-- Categories Filter -->
                <div class="filter-buttons">
                    <button class="filter-btn" id="categoriesBtn">⬇️ All Categories</button>
                    <div class="dropdown-menu-custom" id="categoriesDropdown">
                        <div class="option"><b>All Events</b></div>
                        <hr style="border: 0.5px rgba(0,0,0,0.1) solid; margin: 8px 0;">
                        <div class="option">Academic</div>
                        <div class="option">Sports</div>
                        <div class="option">Arts & Culture</div>
                        <div class="option">Tech & Innovation</div>
                        <div class="option">Workshop</div>
                        <div class="option">Career</div>
                        <div class="option">Social</div>
                        <div class="option">Health & Wellness</div>
                        <div class="option">Entertainment</div>
                    </div>
                </div>

                <!-- Price Filter -->
                <div class="filter-buttons">
                    <button class="filter-btn" id="priceBtn">💲 Filter By Price</button>
                    <div class="dropdown-menu-custom price-btn" id="priceDropdown">
                        <div class="option" data-filter="all"><b>All Events</b></div>
                        <hr style="border: 0.5px rgba(0,0,0,0.1) solid; margin: 8px 0;">
                        <div class="option" data-filter="free">Free</div>
                        <div class="option" data-filter="paid">Paid</div>
                        <button class="reset-btn" id="resetPriceFilter">Reset</button>
                    </div>
                </div>

                <!-- Date Filter -->
                <div class="filter-buttons">
                    <button class="filter-btn" id="dateBtn">📆 Filter By Date</button>
                    <!-- Added dropdown-date-right to fix positioning -->
                    <div class="dropdown-menu-custom dropdown-date-right" id="dateDropdown">
                        <div class="date-filter-form">
                            <label>Month</label>
                            <input type="text" id="monthInput" placeholder="e.g. January">

                            <label>Day</label>
                            <input type="text" id="dayInput" placeholder="e.g. 15">

                            <label>Year</label>
                            <input type="text" id="yearInput" placeholder="e.g. 2024">

                            <button class="filter-apply-btn" id="applyDateFilter">Apply</button>
                        </div>
                        <button class="reset-btn" id="resetDateFilter">Reset</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Event Cards -->
    <section class="event-cards-container" id="eventCardsContainer"></section>

    <footer class="bg-white py-4 text-center shadow-sm"></footer>

    <!--Logic Links-->
    <script type="module" src="/scripts/services/loggedInLogic.js"></script>
    <script type="module" src="/scripts/pages/events.js"></script>
    <script type="module" src="/scripts/components/eventCardsComponents.js"></script>
    <script type="module" src="/scripts/services/wishlist.js"></script>
</body>

</html>
