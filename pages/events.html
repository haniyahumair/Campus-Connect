<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusConnect</title>

    <!--Styling links-->
    <link rel="stylesheet" href="/styles/global.css">
    <link rel="stylesheet" href="/styles/pages/events.css">
</head>

<body>

    <header></header>

    <section class="events-header">
        <h1 class="fw-bold">Discover <i><span class="accent-text">Event’s</span></i></h1>
        <p>Your next great experience starts here</p>


        <div class="search-container">
            <div class="row justify-content-center">
                <div class="search-bar">
                    <input type="text" class="form-control" placeholder="Search event’s by name">
                </div>
                <div class="filter-buttons">
                    <button class="filter-btn" id="categoriesBtn">
                        <!--<img src="/assets/Icons/Funnel Icon.svg" alt="Funnel Icon" class="me-2" width="12" height="12">-->⬇️
                        All Categories
                    </button>
                    <div class="dropdown-menu-custom" id="categoriesDropdown">
                        <div><b>All Events</b></div>
                        <hr style="border: 0.7px black solid;">
                        <div>Academic</div>
                        <div>Sports</div>
                        <div>Arts & Culture</div>
                        <div>Tech & Innovation</div>
                        <div>Workshop</div>
                        <div>Career</div>
                        <div>Social</div>
                        <div>Health & Wellness</div>
                        <div>Entertainment</div>
                    </div>
                </div>

                <div class="filter-buttons">
                    <button class="filter-btn" id="priceBtn">
                        <!--<img src="/assets/Icons/Coin Stacked Icon.svg" alt="Coin Stacked Icon" class="me-2" width="20" height="20">-->💲
                        Filter By Price
                    </button>
                    <div class="dropdown-menu-custom price-btn" id="priceDropdown">
                        <div data-filter="all"><b>All Events</b></div>
                        <hr style="border: 0.7px black solid;">
                        <div data-filter="free">Free</div>
                        <div data-filter="paid">Paid</div>
                    </div>
                </div>

                <div class="filter-buttons">
                    <button class="filter-btn" id="dateBtn">
                        <!--<img src="/assets/Icons/Calendar.svg" alt="Calendar-Icon" class="me-2" width="20"
                            height="20">-->📆 Filter By Date
                    </button>
                    <div class="dropdown-menu-custom date-filter-btn" id="dateDropdown">
                        <div class="date-filter-form">
                            <label>Month</label>
                            <input type="text" id="monthInput" placeholder="e.g., January">

                            <label>Day</label>
                            <input type="text" id="dayInput" placeholder="e.g., 15">

                            <label>Year</label>
                            <input type="text" id="yearInput" placeholder="e.g., 2024">

                            <button id="applyDateFilter">Apply</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Event Cards -->
    <section class="event-cards-container" id="eventCardsContainer"></section>

    <footer class="bg-white py-4 text-center shadow-sm"></footer>

    <!--Logic Links-->
    <script type="module" src="/scripts/services/loggedInLogic.js"></script>
    <script type="module" src="/scripts/pages/events.js"></script>
    <script type="module" src="/scripts/components/eventCardsComponents.js"></script>
    <script type="module" src="/scripts/services/wishlist.js"></script>
</body>

</html>
