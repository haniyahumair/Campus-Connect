<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Campus Connect</title>
    <link rel="stylesheet" href="/styles/pages/login-register.css">
    <style>
        .form-step {
            display: none;
        }

        .form-step.active {
            display: block;
        }

        .form-navigation {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        /* Hide student/admin conditional fields by default via JS-controlled class */
        .student-only,
        .admin-only {
            transition: opacity 0.2s ease;
        }
    </style>
</head>

<body>
    <!--Sign Up Nav Section-->
    <section class="nav" style="margin-top: 24px;">
        <div class="company">
            <div class="logo">
                <a href="/index.html">
                    <img src="/assets/Icons/Logo.svg" alt="CampusConnect Logo">
                </a>
            </div>
            <div class="title">
                <p class="company-name">Campus<b>Connect</b></p>
            </div>
        </div>
    </section>

    <!--Sign Up Body-->
    <main>
        <div class="sign-up-container">
            <div class="sign-up-content">
                <div class="text">
                    <h2 class="message">Get Started</h2>
                    <p class="login-message">Already have an account? <a href="/pages/login.html"
                            class="login-link-btn">Login</a></p>
                </div>
            </div>

            <!--Multi-Step Sign Up Form-->
            <div class="sign-up-form">
                <form class="register-form" id="register-form" novalidate>

                    <!-- Step 1: Role Selection -->
                    <div class="form-step active" data-step="1">
                        <div class="role-selection">
                            <h3>I am a:</h3>
                            <div class="role-options">
                                <label class="role-option">
                                    <input type="radio" name="role" value="student" checked>
                                    <div class="role-card">
                                        <span class="role-icon">🎓</span>
                                        <div class="role-card-info">
                                            <span class="role-label">Student</span>
                                            <span class="role-desc">Attend and register for events</span>
                                        </div>
                                    </div>
                                </label>

                                <label class="role-option">
                                    <input type="radio" name="role" value="admin">
                                    <div class="role-card">
                                        <span class="role-icon">👨‍💼</span>
                                        <div class="role-card-info">
                                            <span class="role-label">Admin</span>
                                            <span class="role-desc">Manage events and users</span>
                                        </div>
                                    </div>
                                </label>
                            </div>
                        </div>

                        <div class="form-navigation">
                            <button type="button" class="btn-next">Continue</button>
                        </div>
                    </div>

                    <!-- Step 2: Account Information -->
                    <div class="form-step" data-step="2">
                        <h4>Account Information</h4>
                        <div class="form-group">
                            <input type="text" name="name" id="name" placeholder="Full Name"
                                style="color: var(--black);" />
                            <input type="email" name="email-address" id="email" placeholder="Email Address"
                                style="color: var(--black);" />
                            <input type="password" name="password" id="password"
                                placeholder="Password (min 6 characters)" minlength="6" style="color: var(--black);" />

                            <!-- Student ID (shown for students only) -->
                            <input type="text" id="student_id" name="student_id" placeholder="Student ID"
                                class="student-only" style="color: var(--black);" />

                            <!-- Department (shown for admins only) -->
                            <input type="text" id="department" name="department" placeholder="Department/Organization"
                                class="admin-only" style="color: var(--black);" />
                        </div>

                        <div class="info-message admin-only">
                            Admin accounts require approval before full access is granted.
                        </div>

                        <div class="form-navigation">
                            <button type="button" class="btn-prev">Back</button>
                            <button type="button" class="btn-next">Continue</button>
                        </div>
                    </div>

                    <!-- Step 3: Profile Information -->
                    <!-- NOTE: No `required` attributes here — validation is handled fully in JS -->
                    <div class="form-step" data-step="3">
                        <h3>Complete Your Profile</h3>

                        <!-- Avatar Upload -->
                        <div class="avatar-upload">
                            <div class="avatar-preview" id="avatarPreview">
                                <span class="avatar-preview-icon">👤</span>
                            </div>
                            <label class="avatar-upload-btn">
                                Choose Avatar
                                <input type="file" id="avatar" name="avatar" accept="image/*" style="display: none;"
                                    class="upload-avatar" />
                            </label>
                        </div>

                        <!-- Student Profile Fields -->
                        <div id="studentProfileFields" class="student-only">
                            <div class="form-group">
                                <input type="text" id="university" name="university" placeholder="University" />
                                <input type="text" id="major" name="major"
                                    placeholder="Major (e.g., Computer Science)" />
                                <select id="year_of_study" name="year_of_study">
                                    <option value="">Select Year of Study</option>
                                    <option value="1">Year 1</option>
                                    <option value="2">Year 2</option>
                                    <option value="3">Year 3</option>
                                    <option value="4">Year 4</option>
                                    <option value="5">Year 5+</option>
                                </select>
                                <textarea id="bio" name="bio" placeholder="Tell us about yourself (optional)"
                                    rows="4"></textarea>
                            </div>
                        </div>

                        <!-- Admin Profile Fields -->
                        <div id="adminProfileFields" class="admin-only">
                            <div class="form-group">
                                <textarea id="admin_bio" name="admin_bio"
                                    placeholder="Tell us about your role (optional)" rows="4"></textarea>
                            </div>
                        </div>

                        <div class="form-navigation">
                            <button type="button" class="btn-prev">Back</button>
                            <button type="submit" class="btn-submit">Create Account</button>
                        </div>
                    </div>

                </form>
            </div>
        </div>

        <!--Sign Up Image-->
        <div class="signup-img">
            <img src="/assets/Images/website graphics.png" alt="Sign Up Image">
        </div>
    </main>

    <script type="module" src="/scripts/pages/signup.js"></script>
</body>

</html>
