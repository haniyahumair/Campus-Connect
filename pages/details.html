<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusConnect</title>

    <!--Styling links-->
    <link rel="stylesheet" href="/styles/global.css">
    <link rel="stylesheet" href="/styles/pages/details.css">
</head>

<body>
    <header></header>

    <section class="event-details-container">
        <div class="event-details">
            <div class="event-image">
                <div class="price-info">
                    <!--<img src="/assets/Icons/Coin Stacked Icon.svg" alt="Coin-Icon">-->
                    <p class="price"></p>
                </div>
                <img src="" class="image" alt="Event Image">
            </div>
            <div class="card-body">
                <div class="header">
                    <h2 class="event-title"></h2>
                    <div class="detail-buttons">
                        <button class="event-type">
                            <img src="/assets/Icons/Star 1.svg" alt="Star-Icon">
                            <span class="type-text"></span>
                        </button>
                        <button class="share-button">
                            <img src="/assets/Icons/Share Icon.svg" alt="Share-Icon">
                            Share
                        </button>
                        <button class="save-event details-pg">
                            <img src="/assets/Icons/Heart outline peach.svg" class="before-heart-icon" alt="Save Event">
                        </button>
                    </div>
                </div>
                <div class="about">
                    <h5 class="heading">About Event</h5>
                    <p class="description"></p>
                </div>
                <div class="details">
                    <h5 class="heading">Event Details</h5>
                    <p class="date"><strong>📅 Date:</strong> <span class="date-text"></span></p>
                    <p class="time"><strong>🕕 Time:</strong> <span class="time-text"></span></p>
                    <p class="location"><strong>📍 Location:</strong> <span class="location-text"></span></p>
                    <p class="contact-email"><strong>📧 Contact Email:</strong> <span class="email-text"></span></p>
                    <hr>
                    <!-- map here -->
                    <div class="maps-display">
                        <p class="embeded-google-maps"><strong>🗺️ Google Maps:</strong><span
                                class="embeded-google-maps"></span></p>
                        <iframe id="mapsIframe" src="" frameborder="0"></iframe>
                    </div>
                </div>
                <div class="cart-button">
                    <button class="cart-btn" id="cartBtn">Add to Cart</button>
                </div>
            </div>
        </div>
    </section>

    <footer class="bg-white py-4 text-center shadow-sm"></footer>

    <script type="module" src="/scripts/services/loggedInLogic.js"></script>
    <script type="module" src="/scripts/services/cardDetails.js"></script>
    <script type="module" src="/scripts/services/eventsDatabase.js"></script>
</body>

</html>
